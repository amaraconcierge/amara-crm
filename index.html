<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Amara CRM</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,400;1,500&display=swap" rel="stylesheet">
<style>
:root{
  --linen-cream:   #FBF7EC;
  --linen-teal:    #021620;
  --tile-cream:    #FFFCF4;
  --tile-edge:     rgba(26, 26, 26, 0.08);
  --ink:           #1A1A1A;
  --ink-muted:     #5C5347;
  --ink-faint:     #8A8275;
  --cream-on-teal:    #FBF7EC;
  --cream-on-teal-mu: #D4DDE3;
  --cream-on-teal-faint: #8FA0AB;
  --rule: rgba(26, 26, 26, 0.10);
  --rule-strong: rgba(26, 26, 26, 0.20);
  --rule-on-teal: rgba(251, 247, 236, 0.16);
  --code-consultation: #5A7A55;
  --code-procedure:    #B85A3F;
  --code-scan:         #A66060;
  --code-bloods:       #3D6B85;
  --code-medication:   #C28A3A;
  --code-genetic:      #6B5B8A;
  --code-positive: #5A7A55;
  --accent-ochre:      #C28A3A;
  --sos-red:           #B23A2F;
  --serif: 'Cormorant Garamond', 'Times New Roman', serif;
  --sans:  -apple-system, 'Helvetica Neue', sans-serif;
  --mono:  'SF Mono', Menlo, monospace;
  --lift: 0 1px 2px rgba(26,26,26,0.04), 0 6px 18px rgba(26,26,26,0.06);
  --lift-lg: 0 8px 30px rgba(26,26,26,0.14), 0 2px 8px rgba(26,26,26,0.08);
}
.linen-teal{
  background-color: var(--linen-teal);
  background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='180' height='180'><filter id='warp'><feTurbulence type='turbulence' baseFrequency='0.04 0.95' numOctaves='2' stitchTiles='stitch' seed='5'/><feColorMatrix values='0 0 0 0 0.92 0 0 0 0 0.89 0 0 0 0 0.80 0 0 0 0.08 0'/></filter><filter id='weft'><feTurbulence type='turbulence' baseFrequency='0.95 0.04' numOctaves='2' stitchTiles='stitch' seed='7'/><feColorMatrix values='0 0 0 0 0.92 0 0 0 0 0.89 0 0 0 0 0.80 0 0 0 0.07 0'/></filter><rect width='180' height='180' filter='url(%23warp)'/><rect width='180' height='180' filter='url(%23weft)'/></svg>");
  background-size: 180px 180px;
}
.linen-cream, body{
  background-color: var(--linen-cream);
  background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='180' height='180'><filter id='warp'><feTurbulence type='turbulence' baseFrequency='0.04 0.95' numOctaves='2' stitchTiles='stitch' seed='5'/><feColorMatrix values='0 0 0 0 0.32 0 0 0 0 0.26 0 0 0 0 0.16 0 0 0 0.20 0'/></filter><filter id='weft'><feTurbulence type='turbulence' baseFrequency='0.95 0.04' numOctaves='2' stitchTiles='stitch' seed='7'/><feColorMatrix values='0 0 0 0 0.32 0 0 0 0 0.26 0 0 0 0 0.16 0 0 0 0.18 0'/></filter><rect width='180' height='180' filter='url(%23warp)'/><rect width='180' height='180' filter='url(%23weft)'/></svg>");
  background-size: 180px 180px;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{font-family:var(--sans);color:var(--ink);-webkit-font-smoothing:antialiased;font-size:13px;line-height:1.45;}
a{color:inherit;text-decoration:none;}
button{font-family:var(--sans);cursor:pointer;}
input,textarea,select{font-family:var(--sans);}
::-webkit-scrollbar{width:8px;height:8px;}
::-webkit-scrollbar-thumb{background:var(--rule-strong);border-radius:4px;}

/* ---------- shell ---------- */
#app{display:flex;min-height:100vh;}
.sidebar{
  width:230px;flex-shrink:0;color:var(--cream-on-teal);
  display:flex;flex-direction:column;padding:18px 12px;position:sticky;top:0;height:100vh;
}
.brand{display:flex;align-items:center;gap:10px;padding:4px 8px 20px 8px;}
.brand-mark{width:32px;height:32px;border-radius:8px;background:rgba(251,247,236,0.12);display:flex;align-items:center;justify-content:center;flex-shrink:0;padding:4px;}
.brand-mark img{width:100%;height:100%;object-fit:contain;}
.brand-name{font-family:var(--serif);font-style:italic;font-size:17px;color:#fff;}
.brand-name .em{font-weight:500;font-style:normal;letter-spacing:0.08em;}
.brand-sub{font-size:10px;color:var(--cream-on-teal-faint);margin-top:1px;font-family:var(--sans);}

.nav-label{font-size:9.5px;text-transform:uppercase;letter-spacing:0.12em;color:var(--cream-on-teal-faint);padding:14px 10px 6px;}
.nav-item{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:7px;color:var(--cream-on-teal-mu);cursor:pointer;font-size:12.5px;font-weight:600;margin-bottom:1px;border-left:2px solid transparent;}
.nav-item:hover{background:rgba(251,247,236,0.06);color:#fff;}
.nav-item.active{background:rgba(251,247,236,0.09);color:#fff;border-left-color:var(--accent-ochre);}
.nav-item svg{width:15px;height:15px;flex-shrink:0;opacity:0.9;}
.nav-count{margin-left:auto;font-size:10px;background:rgba(251,247,236,0.12);padding:1px 7px;border-radius:20px;color:var(--cream-on-teal-mu);}
.sidebar-footer{margin-top:auto;padding-top:12px;border-top:1px solid var(--rule-on-teal);}
.user-chip{display:flex;align-items:center;gap:8px;padding:7px 8px;border-radius:8px;cursor:pointer;}
.user-chip:hover{background:rgba(251,247,236,0.06);}

.main{flex:1;min-width:0;display:flex;flex-direction:column;}
.topbar{display:flex;align-items:center;gap:14px;padding:12px 26px;border-bottom:1px solid var(--rule);background:var(--tile-cream);position:sticky;top:0;z-index:30;}
.search-wrap{flex:1;max-width:380px;position:relative;}
.search-wrap input{width:100%;padding:8px 12px 8px 32px;border-radius:100px;border:1px solid var(--rule-strong);background:var(--linen-cream);font-size:12.5px;color:var(--ink);outline:none;}
.search-wrap input:focus{border-color:var(--accent-ochre);}
.search-wrap svg{position:absolute;left:11px;top:50%;transform:translateY(-50%);width:14px;height:14px;color:var(--ink-faint);}
.icon-btn{width:32px;height:32px;border-radius:50%;border:1px solid var(--rule-strong);background:var(--tile-cream);color:var(--ink-muted);display:grid;place-items:center;font-size:14px;position:relative;flex-shrink:0;}
.icon-btn:hover{background:#F3EEDF;}
.icon-btn .bubble{position:absolute;top:-4px;right:-4px;min-width:15px;height:15px;border-radius:8px;background:var(--sos-red);color:#fff;font-size:9px;font-weight:700;display:grid;place-items:center;padding:0 3px;border:1.5px solid var(--tile-cream);}
.avatar-chip{display:flex;align-items:center;gap:8px;padding:4px 10px 4px 4px;border-radius:100px;border:1px solid var(--rule);background:var(--tile-cream);cursor:pointer;}
.avatar-chip:hover{background:#F3EEDF;}
.av{width:26px;height:26px;border-radius:50%;color:#fff;display:grid;place-items:center;font-size:10.5px;font-weight:700;font-family:var(--sans);flex-shrink:0;}
.av.teal{background:var(--linen-teal);color:var(--cream-on-teal);}
.avatar-chip .nm{font-size:11.5px;font-weight:600;color:var(--ink);}
.avatar-chip .role{font-size:9px;color:var(--ink-faint);font-family:var(--serif);font-style:italic;}

.content{padding:24px 28px 40px;flex:1;}
.page-head{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:18px;flex-wrap:wrap;gap:10px;}
.page-head h1{font-family:var(--serif);font-weight:400;font-size:28px;margin:0;color:var(--ink);}
.eyebrow{font-family:var(--serif);font-style:italic;font-size:13px;color:var(--ink-muted);margin:0 0 2px;}
.page-sub{font-size:11.5px;color:var(--ink-faint);margin-top:4px;}
.head-actions{display:flex;gap:8px;}

/* ---------- buttons / fields ---------- */
.btn{font-family:var(--sans);font-size:11.5px;font-weight:600;padding:8px 15px;border-radius:7px;border:1px solid var(--rule-strong);background:var(--tile-cream);color:var(--ink);display:inline-flex;align-items:center;gap:6px;transition:transform .08s ease;}
.btn:active{transform:scale(0.97);}
.btn:hover{background:#F3EEDF;}
.btn.primary{background:var(--linen-teal);color:var(--cream-on-teal);border-color:var(--linen-teal);}
.btn.primary:hover{background:#04222f;}
.btn.ochre{background:var(--accent-ochre);color:#fff;border-color:var(--accent-ochre);}
.btn.ochre:hover{filter:brightness(0.95);}
.btn.ghost{background:transparent;border-color:var(--rule);color:var(--ink-muted);}
.btn.danger{background:transparent;border-color:rgba(178,58,47,0.4);color:var(--sos-red);}
.btn.sm{padding:5px 11px;font-size:10.5px;}
.btn:disabled{opacity:0.45;cursor:not-allowed;}

.field{margin-bottom:14px;}
.field label{display:block;font-size:9.5px;letter-spacing:0.12em;text-transform:uppercase;color:var(--ink-faint);margin-bottom:5px;font-weight:700;}
.field input,.field textarea,.field select{width:100%;padding:9px 11px;border-radius:7px;border:1px solid var(--rule-strong);background:var(--linen-cream);font-size:12.5px;color:var(--ink);outline:none;-webkit-appearance:none;-moz-appearance:none;appearance:none;line-height:1.3;box-sizing:border-box;min-height:38px;}
.field select{background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='6'><path d='M1 1l4 4 4-4' stroke='%235C5347' stroke-width='1.4' fill='none' stroke-linecap='round' stroke-linejoin='round'/></svg>");background-repeat:no-repeat;background-position:right 12px center;padding-right:30px;}
.field input[type="number"]::-webkit-inner-spin-button,.field input[type="number"]::-webkit-outer-spin-button{-webkit-appearance:none;margin:0;}
.field input[type="number"]{-moz-appearance:textfield;}
.field input[type="date"]::-webkit-calendar-picker-indicator{opacity:0.6;cursor:pointer;}
.field textarea{min-height:60px;height:auto;}
.field input:focus,.field textarea:focus,.field select:focus{border-color:var(--accent-ochre);}
.field textarea{resize:vertical;min-height:60px;}
.field-row{display:flex;gap:12px;}
.field-row .field{flex:1;}

/* ---------- tiles / kpis ---------- */
.kpi-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:14px;margin-bottom:22px;}
.kpi-tile{background:var(--tile-cream);border:1px solid var(--tile-edge);border-radius:12px;box-shadow:var(--lift);padding:15px 18px;}
.kpi-label{font-size:9.5px;text-transform:uppercase;letter-spacing:0.1em;color:var(--ink-faint);}
.kpi-value{font-family:var(--serif);font-size:30px;font-weight:500;margin-top:6px;color:var(--ink);}
.kpi-delta{font-size:11px;margin-top:4px;color:var(--ink-muted);}
.kpi-delta.warn{color:var(--sos-red);}

.tile{background:var(--tile-cream);border:1px solid var(--tile-edge);border-radius:12px;box-shadow:var(--lift);padding:16px 18px;margin-bottom:20px;}
.tile-h{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.tile-h h3{font-family:var(--serif);font-style:italic;font-weight:500;font-size:15px;color:var(--ink-muted);margin:0;}

.motif{width:100%;height:13px;margin:2px 0 14px;opacity:0.6;}
.motif path{stroke:var(--accent-ochre);stroke-width:1.5;fill:none;stroke-linecap:round;}

/* ---------- tables ---------- */
table{width:100%;border-collapse:collapse;font-size:12.5px;}
th{text-align:left;font-size:9.5px;text-transform:uppercase;letter-spacing:0.08em;color:var(--ink-faint);font-weight:700;padding:9px 10px;border-bottom:1px solid var(--rule);cursor:pointer;white-space:nowrap;}
th:hover{color:var(--ink);}
th .arrow{margin-left:4px;font-size:9px;opacity:0.6;}
td{padding:10px 10px;border-bottom:1px solid var(--rule);vertical-align:middle;}
tr.clickable:hover{background:rgba(194,138,58,0.05);cursor:pointer;}
.task-row.clickable{cursor:pointer;}
.task-row.clickable:hover{background:rgba(194,138,58,0.05);border-radius:8px;}

.pill{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:100px;font-size:9.5px;font-weight:700;letter-spacing:0.02em;white-space:nowrap;}
.pill-individual{background:rgba(61,107,133,0.15);color:#2C526A;}
.pill-company{background:rgba(194,138,58,0.15);color:#8A6323;}
.pill-referrer{background:rgba(107,91,138,0.15);color:#4E3F6B;}
.pill-partner{background:rgba(90,122,85,0.15);color:#3E5B3A;}
.pill-new{background:rgba(61,107,133,0.15);color:#2C526A;}
.pill-proposal{background:rgba(194,138,58,0.15);color:#8A6323;}
.pill-negotiation{background:rgba(166,96,96,0.15);color:#7A4444;}
.pill-won{background:rgba(90,122,85,0.15);color:#3E5B3A;}
.pill-lost{background:rgba(178,58,47,0.15);color:var(--sos-red);}
.pill-role-superadmin{background:var(--linen-teal);color:var(--cream-on-teal);}
.pill-role-manager{background:rgba(194,138,58,0.15);color:#8A6323;}
.pill-role-staff{background:rgba(26,26,26,0.07);color:var(--ink-muted);}
.pill-active{background:rgba(90,122,85,0.15);color:#3E5B3A;}
.pill-invited{background:rgba(194,138,58,0.15);color:#8A6323;}

.filter-row{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;align-items:center;}
.chip{padding:6px 13px;border-radius:100px;font-size:11.5px;font-weight:600;border:1px solid var(--rule-strong);background:var(--tile-cream);cursor:pointer;color:var(--ink-muted);}
.chip.active{background:var(--linen-teal);color:var(--cream-on-teal);border-color:var(--linen-teal);}

/* ---------- kanban ---------- */
.kanban{display:flex;gap:14px;overflow-x:auto;padding-bottom:8px;}
.kanban-col{min-width:250px;flex:1;background:rgba(26,26,26,0.03);border-radius:12px;padding:12px;border:1px solid var(--tile-edge);}
.kanban-col.dragover{background:rgba(194,138,58,0.08);}
.kanban-col-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;padding:0 4px;}
.kanban-col-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.04em;color:var(--ink-muted);}
.kanban-col-sum{font-size:10.5px;color:var(--ink-faint);margin-top:2px;font-family:var(--mono);}
.kanban-count{background:var(--rule);border-radius:20px;padding:1px 8px;font-size:10px;color:var(--ink-muted);}
.opp-card{background:var(--tile-cream);border:1px solid var(--tile-edge);border-radius:10px;padding:11px 12px;margin-bottom:8px;cursor:grab;box-shadow:var(--lift);}
.opp-card:active{cursor:grabbing;}
.opp-card.dragging{opacity:0.4;}
.opp-title{font-family:var(--serif);font-weight:500;font-size:14px;margin-bottom:3px;}
.opp-contact{font-size:11px;color:var(--ink-muted);margin-bottom:6px;}
.opp-meta{display:flex;justify-content:space-between;align-items:center;font-size:11.5px;}
.opp-value{font-family:var(--mono);font-weight:700;color:var(--linen-teal);}
.opp-date{color:var(--ink-faint);font-size:10.5px;}

/* ---------- tasks / activity ---------- */
.task-row{display:flex;align-items:flex-start;gap:12px;padding:11px 4px;border-bottom:1px solid var(--rule);}
.task-row:last-child{border-bottom:none;}
.task-check{width:18px;height:18px;border-radius:50%;border:2px solid var(--rule-strong);flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;margin-top:1px;}
.task-check.done{background:var(--code-positive);border-color:var(--code-positive);}
.task-check svg{width:10px;height:10px;color:#fff;}
.task-title{font-size:13px;font-weight:600;}
.task-title.done{text-decoration:line-through;color:var(--ink-faint);}
.task-sub{font-size:11px;color:var(--ink-muted);margin-top:2px;}
.task-due{font-size:10.5px;font-weight:700;padding:2px 9px;border-radius:100px;white-space:nowrap;}
.due-overdue{background:rgba(178,58,47,0.15);color:var(--sos-red);}
.due-soon{background:rgba(194,138,58,0.15);color:#8A6323;}
.due-later{background:rgba(26,26,26,0.05);color:var(--ink-muted);}
.due-done{background:rgba(90,122,85,0.15);color:#3E5B3A;}

.activity-item{display:flex;gap:10px;padding:10px 0;border-bottom:1px solid var(--rule);}
.activity-item:last-child{border-bottom:none;}
.act-icon{width:26px;height:26px;border-radius:50%;background:rgba(194,138,58,0.12);display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0;}
.act-meta{font-size:10.5px;color:var(--ink-faint);margin-bottom:2px;}
.act-text{font-size:12.5px;color:var(--ink);white-space:pre-wrap;}

/* ---------- modal ---------- */
.modal-overlay{position:fixed;inset:0;background:rgba(2,22,32,0.55);z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px;animation:fadeIn .15s ease;}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal{background:var(--tile-cream);border-radius:12px;box-shadow:var(--lift-lg);width:100%;max-width:520px;max-height:88vh;overflow-y:auto;animation:popIn .16s ease;}
.modal.wide{max-width:760px;}
@keyframes popIn{from{transform:scale(0.97);opacity:0.7}to{transform:scale(1);opacity:1}}
.modal-head{padding:16px 20px;border-bottom:1px solid var(--rule);display:flex;justify-content:space-between;align-items:center;}
.modal-head h2{font-family:var(--serif);font-weight:400;font-size:20px;margin:0;}
.modal-close{background:none;border:none;font-size:16px;color:var(--ink-faint);}
.modal-body{padding:18px 20px;}
.modal-foot{padding:14px 20px;border-top:1px solid var(--rule);display:flex;justify-content:flex-end;gap:8px;}

.overlay-right{position:fixed;inset:0;background:rgba(2,22,32,0.45);z-index:100;display:flex;justify-content:flex-end;animation:fadeIn .15s ease;}
.slideover{width:460px;max-width:92vw;background:var(--linen-cream);height:100%;overflow-y:auto;box-shadow:-8px 0 30px rgba(0,0,0,0.18);}

.empty-state{text-align:center;padding:40px 20px;color:var(--ink-muted);}
.empty-state .em-icon{font-size:28px;margin-bottom:8px;}
.empty-state .empty-logo{width:64px;height:auto;opacity:0.55;margin-bottom:10px;display:inline-block;filter:saturate(0.85);}
.empty-state p{font-family:var(--serif);font-style:italic;font-size:13.5px;color:var(--ink-faint);margin-top:6px;}

.toast-wrap{position:fixed;bottom:20px;right:20px;z-index:2000;display:flex;flex-direction:column;gap:8px;}
.toast{background:var(--linen-teal);color:var(--cream-on-teal);padding:10px 16px;border-radius:8px;font-size:12px;box-shadow:var(--lift-lg);max-width:320px;animation:toastin .2s ease-out;}
@keyframes toastin{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}

.ai-tile{background:linear-gradient(135deg, rgba(194,138,58,0.10), rgba(2,22,32,0.05));border:1px solid rgba(194,138,58,0.25);}
.ai-tile-head{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
.ai-mark{width:22px;height:22px;border-radius:6px;background:var(--accent-ochre);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.ai-text{font-size:13px;color:var(--ink);line-height:1.65;white-space:pre-wrap;}
.ai-actions{display:flex;gap:8px;margin-top:12px;}
.spinner{width:13px;height:13px;border:2px solid rgba(255,255,255,0.4);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;display:inline-block;}
@keyframes spin{to{transform:rotate(360deg)}}

.report-grid{display:grid;grid-template-columns:1.3fr 1fr;gap:16px;}
@media (max-width:900px){.report-grid{grid-template-columns:1fr;}}
.bar-row{display:flex;align-items:center;gap:10px;margin-bottom:9px;}
.bar-label{width:140px;font-size:12px;color:var(--ink);flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.bar-track{flex:1;height:8px;background:rgba(26,26,26,0.06);border-radius:6px;overflow:hidden;}
.bar-fill{height:100%;background:var(--code-bloods);border-radius:6px;}
.bar-value{width:70px;text-align:right;font-family:var(--mono);font-size:11px;color:var(--ink-muted);flex-shrink:0;}

.onboard-banner{background:linear-gradient(120deg, rgba(194,138,58,0.10), rgba(61,107,133,0.08));border:1px solid rgba(194,138,58,0.25);border-radius:14px;padding:20px 22px;margin-bottom:22px;position:relative;}
.onboard-skip{position:absolute;top:16px;right:18px;font-size:10.5px;color:var(--ink-faint);cursor:pointer;text-transform:uppercase;letter-spacing:0.06em;}
.onboard-checklist{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:10px;margin-top:14px;}
.onboard-step{background:var(--tile-cream);border:1px solid var(--tile-edge);border-radius:9px;padding:11px 13px;cursor:pointer;}
.onboard-step .oc{width:16px;height:16px;border-radius:50%;border:2px solid var(--rule-strong);display:inline-flex;align-items:center;justify-content:center;margin-right:7px;font-size:9px;}
.onboard-step.done .oc{background:var(--code-positive);border-color:var(--code-positive);color:#fff;}
.onboard-step-title{font-size:12px;font-weight:600;display:flex;align-items:center;}

@media (max-width:760px){
  .sidebar{position:fixed;left:-260px;transition:left .2s ease;z-index:150;}
  .sidebar.open{left:0;}
  .topbar{padding:10px 14px;}
  .content{padding:16px 14px;}
  .slideover{width:100%;}
}
.mobile-toggle{display:none;background:none;border:none;cursor:pointer;color:var(--ink);}
@media (max-width:760px){.mobile-toggle{display:block;}}

button:focus-visible,.chip:focus-visible,.nav-item:focus-visible,th:focus-visible{outline:2px solid var(--accent-ochre);outline-offset:2px;}
@media (prefers-reduced-motion: reduce){*{animation:none !important;transition:none !important;}}

/* ---------- leads / campaigns / products pills ---------- */
.pill-lead-new{background:rgba(61,107,133,0.15);color:#2C526A;}
.pill-lead-contacted{background:rgba(194,138,58,0.15);color:#8A6323;}
.pill-lead-qualified{background:rgba(107,91,138,0.15);color:#4E3F6B;}
.pill-lead-converted{background:rgba(90,122,85,0.15);color:#3E5B3A;}
.pill-lead-disqualified{background:rgba(178,58,47,0.15);color:var(--sos-red);}
.pill-camp-planned{background:rgba(26,26,26,0.07);color:var(--ink-muted);}
.pill-camp-active{background:rgba(90,122,85,0.15);color:#3E5B3A;}
.pill-camp-completed{background:rgba(61,107,133,0.15);color:#2C526A;}
.doc-row{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--rule);font-size:12.5px;}
.doc-row:last-child{border-bottom:none;}
.doc-row a{color:var(--accent-ochre);font-weight:600;}

/* ---------- analytics widget dashboard ---------- */
.widget-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px;}
.widget-tile{background:var(--tile-cream);border:1px solid var(--tile-edge);border-radius:12px;box-shadow:var(--lift);padding:15px 17px;position:relative;cursor:grab;}
.home-section-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(320px,1fr));gap:16px;align-items:start;}
.home-section-wrap{}
.home-section-wrap.span-full{grid-column:1/-1;}
.home-section-wrap.dragging{opacity:0.4;}
.home-section-wrap.drag-target{outline:2px dashed var(--accent-ochre);outline-offset:3px;border-radius:12px;}
.chip.dragging{opacity:0.4;}
.chip.drag-target{outline:2px dashed var(--accent-ochre);}
.widget-tile.dragging{opacity:0.4;}
.widget-tile.drag-target{outline:2px dashed var(--accent-ochre);outline-offset:3px;}
.widget-remove{position:absolute;top:10px;right:10px;background:none;border:none;color:var(--ink-faint);font-size:13px;cursor:pointer;}
.widget-remove:hover{color:var(--sos-red);}
.widget-kicker{font-size:9px;text-transform:uppercase;letter-spacing:0.1em;color:var(--accent-ochre);font-weight:700;margin-bottom:4px;}
.widget-title{font-family:var(--serif);font-style:italic;font-size:14px;color:var(--ink-muted);margin-bottom:10px;padding-right:20px;}
.widget-kpi-value{font-family:var(--serif);font-size:32px;font-weight:500;color:var(--ink);}
.widget-picker-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:12px 0;}
.widget-type-opt{border:1px solid var(--rule-strong);border-radius:9px;padding:14px 8px;text-align:center;cursor:pointer;background:var(--linen-cream);}
.widget-type-opt.sel{background:var(--linen-teal);color:var(--cream-on-teal);border-color:var(--linen-teal);}
.widget-type-opt .wt-icon{font-size:18px;display:block;margin-bottom:4px;}
.widget-type-opt .wt-label{font-size:10.5px;font-weight:600;}
.funnel-wrap{display:flex;flex-direction:column;gap:10px;align-items:center;}
.funnel-row{display:flex;flex-direction:column;gap:4px;}
.funnel-row-top{display:flex;justify-content:space-between;align-items:baseline;gap:8px;}
.funnel-row-label{font-size:11px;font-weight:600;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.funnel-row-value{font-size:10.5px;color:var(--ink-faint);font-family:var(--mono);flex-shrink:0;}
.funnel-row-track{height:10px;background:rgba(26,26,26,0.06);border-radius:6px;overflow:hidden;}
.funnel-row-fill{height:100%;border-radius:6px;}
.target-meter-track{height:14px;background:rgba(26,26,26,0.06);border-radius:8px;overflow:hidden;margin:8px 0 6px;}
.target-meter-fill{height:100%;background:var(--accent-ochre);border-radius:8px;}
.comparator-row{display:flex;gap:16px;align-items:baseline;}
.comparator-col{flex:1;text-align:center;}
.comparator-num{font-family:var(--serif);font-size:26px;font-weight:500;}
.comparator-label{font-size:10px;color:var(--ink-faint);text-transform:uppercase;letter-spacing:0.06em;margin-top:2px;}
.comparator-vs{font-family:var(--serif);font-style:italic;color:var(--ink-faint);font-size:13px;}

.print-only{display:none;}
@media print{
  .sidebar, .topbar, .no-print, .toast-wrap{display:none !important;}
  .main{display:block !important;}
  .content{padding:0 !important;}
  .print-only{display:block !important;}
  body{background:#fff !important;}
  .tile{box-shadow:none !important;border:1px solid #ccc !important;break-inside:avoid;}
}
</style>

/* ============ storage helpers (Supabase-backed) ============ */
// Maps our internal "prefix:id" key style onto real Supabase tables,
// so every render/event function elsewhere in this file — written to expect
// storeSet/storeGet/storeDelete/loadCollection — keeps working unchanged.
const PREFIX_TABLE = {
  'contact:':'contacts', 'note:':'notes', 'opp:':'opportunities', 'task:':'tasks',
  'lead:':'leads', 'product:':'products', 'campaign:':'campaigns', 'doc:':'documents',
  'widget:':'widgets', 'rule:':'automation_rules', 'taskComment:':'task_comments', 'user:':'profiles'
};
function camelToSnake(s){ return s.replace(/([A-Z])/g,'_$1').toLowerCase(); }
function snakeToCamel(s){ return s.replace(/_([a-z0-9])/g,(_,c)=>c.toUpperCase()); }
function rowToCamel(row){
  if(!row) return row;
  const out = {};
  for(const k in row) out[snakeToCamel(k)] = row[k];
  if(out.role) out.role = out.role.charAt(0).toUpperCase()+out.role.slice(1);
  return out;
}
function objToSnake(obj){
  const out = {};
  for(const k in obj){ if(obj[k]!==undefined) out[camelToSnake(k)] = obj[k]; }
  if(out.role) out.role = String(out.role).toLowerCase();
  return out;
}
function splitKey(key){
  const idx = key.indexOf(':');
  const prefix = key.slice(0, idx+1);
  const id = key.slice(idx+1);
  return {prefix, id, table: PREFIX_TABLE[prefix]};
}

async function storeSet(key, obj, shared){
  try{
    if(key === 'company:profile'){
      const row = objToSnake(obj);
      const {error} = await sb.from('company_settings').update(row).eq('id',1);
      if(error) throw error;
      return true;
    }
    if(key === 'meta:onboarding-dismissed') return true; // session-only in the Supabase build, not persisted
    if(key === 'layout:home'){
      const {error} = await sb.from('home_layout').update({sections: obj.sections}).eq('id',1);
      if(error) throw error;
      return true;
    }
    const {table, id} = splitKey(key);
    if(!table){ console.error('Unknown storage key prefix', key); return null; }
    const row = objToSnake(obj);
    row.id = id;

async function storeGet(key, shared){

function dueClass(dueDate,done){
  if(done) return 'due-done';
  if(!dueDate) return 'due-later';
  const days=(new Date(dueDate)-new Date(todayISO()))/86400000;
  if(days<0) return 'due-overdue';
  if(days<=3) return 'due-soon';
  return 'due-later';
}
function dueLabel(dueDate,done){
  if(done) return 'Done';
  if(!dueDate) return 'No date';
  const days=Math.round((new Date(dueDate)-new Date(todayISO()))/86400000);
  if(days<0) return Math.abs(days)+'d overdue';
  if(days===0) return 'Due today';
  return 'Due in '+days+'d';
}

async function createRepeatFollowUp(t){
  let nextDue = t.dueDate || todayISO();
  if(t.repeat==='daily') nextDue = addDays(nextDue, 1);
  else if(t.repeat==='weekly') nextDue = addDays(nextDue, 7);
  else if(t.repeat==='monthly') nextDue = addDays(nextDue, 30);
  else return;
  const nt = { id:uid('task'), title:t.title, contactId:t.contactId||null, oppId:t.oppId||null, ownerId:t.ownerId||null, dueDate:nextDue, priority:t.priority||'normal', repeat:t.repeat, status:'Not Started', done:false, author:t.author, createdAt:todayISO() };
  await storeSet('task:'+nt.id, nt);
  state.tasks.push(nt);
  flashToast('Next occurrence scheduled for '+fmtDate(nextDue));
}

function computeStats(){
  const monthStart = new Date().toISOString().slice(0,7);
  const enquiriesThisMonth = state.opps.filter(o=>(o.createdAt||'').slice(0,7)===monthStart).length;
  const won = state.opps.filter(o=>o.stage==='won');
  const lost = state.opps.filter(o=>o.stage==='lost');
  const winRate = (won.length+lost.length)>0 ? Math.round(won.length/(won.length+lost.length)*100) : 0;
  const revenueTotal = won.reduce((s,o)=>s+(Number(o.value)||0),0);
  const revenueByClient = {};
  won.forEach(o=>{ const c=contactById(o.contactId); const name=c?(c.company||c.name):'Unknown'; revenueByClient[name]=(revenueByClient[name]||0)+(Number(o.value)||0); });
  const topClients = Object.entries(revenueByClient).sort((a,b)=>b[1]-a[1]).slice(0,6);
  const sourceCounts = {};
  state.opps.forEach(o=>{ const s=o.source||'Unspecified'; sourceCounts[s]=(sourceCounts[s]||0)+1; });
  const topSources = Object.entries(sourceCounts).sort((a,b)=>b[1]-a[1]).slice(0,6);
  const outstanding = state.tasks.filter(t=>!t.done);
  const overdue = outstanding.filter(t=>t.dueDate && t.dueDate<todayISO());
  const stageCounts = {}; STAGES.forEach(s=>stageCounts[s.id]=0);
  state.opps.forEach(o=>stageCounts[o.stage]=(stageCounts[o.stage]||0)+1);
  return {enquiriesThisMonth,winRate,revenueTotal,topClients,topSources,outstanding,overdue,stageCounts,wonCount:won.length,lostCount:lost.length,totalOpps:state.opps.length};
}

function getRangeDates(range){
  const now = new Date(); let start, end;
  if(range==='month'){ start=new Date(now.getFullYear(),now.getMonth(),1); end=new Date(now.getFullYear(),now.getMonth()+1,0,23,59,59,999); }
  else if(range==='lastMonth'){ start=new Date(now.getFullYear(),now.getMonth()-1,1); end=new Date(now.getFullYear(),now.getMonth(),0,23,59,59,999); }
  else if(range==='quarter'){ const q=Math.floor(now.getMonth()/3); start=new Date(now.getFullYear(),q*3,1); end=new Date(now.getFullYear(),q*3+3,0,23,59,59,999); }
  else if(range==='year'){ start=new Date(now.getFullYear(),0,1); end=new Date(now.getFullYear(),11,31,23,59,59,999); }
  else { start=new Date(2000,0,1); end=new Date(2100,0,1); }
  return {startISO:start.toISOString(), endISO:end.toISOString()};
}
function computeRangeStats(range){
  const {startISO,endISO} = getRangeDates(range);
  const inRange = o => (o.createdAt||'') >= startISO && (o.createdAt||'') <= endISO;
  const oppsInRange = state.opps.filter(inRange);
  const won = oppsInRange.filter(o=>o.stage==='won');
  const lost = oppsInRange.filter(o=>o.stage==='lost');
  const winRate = (won.length+lost.length)>0 ? Math.round(won.length/(won.length+lost.length)*100) : 0;
  const revenueTotal = won.reduce((s,o)=>s+(Number(o.value)||0),0);
  const revenueByClient = {};
  won.forEach(o=>{ const c=contactById(o.contactId); const name=c?(c.company||c.name):'Unknown'; revenueByClient[name]=(revenueByClient[name]||0)+(Number(o.value)||0); });
  const topClients = Object.entries(revenueByClient).sort((a,b)=>b[1]-a[1]).slice(0,6);
  const sourceCounts = {};
  oppsInRange.forEach(o=>{ const s=o.source||'Unspecified'; sourceCounts[s]=(sourceCounts[s]||0)+1; });
  const topSources = Object.entries(sourceCounts).sort((a,b)=>b[1]-a[1]).slice(0,6);
  return {enquiries:oppsInRange.length, winRate, revenueTotal, topClients, topSources, wonCount:won.length, lostCount:lost.length, opps:oppsInRange};

function computeTrend(months){
  months = months||6;
  const now = new Date();
  const series = [];
  for(let i=months-1;i>=0;i--){
    const d = new Date(now.getFullYear(), now.getMonth()-i, 1);
    const key = d.toISOString().slice(0,7);
    const label = d.toLocaleDateString('en-US',{month:'short'});
    const oppsIn = state.opps.filter(o=>(o.createdAt||'').slice(0,7)===key);
    const revenue = oppsIn.filter(o=>o.stage==='won').reduce((s,o)=>s+(Number(o.value)||0),0);
    series.push({key, label, enquiries:oppsIn.length, revenue});
  }
  return series;
}
function renderTrendChart(series, valueKey, color){
  const w=560, h=140, pad=28;
  const values = series.map(s=>s[valueKey]);
  const max = Math.max(...values, 1);
  const stepX = (w-pad*2)/Math.max(series.length-1,1);
  const points = series.map((s,i)=>{
    const x = pad + i*stepX;
    const y = h-pad - (s[valueKey]/max)*(h-pad*2);
    return [x,y];
  });
  const linePath = points.map((p,i)=>(i===0?'M':'L')+p[0].toFixed(1)+' '+p[1].toFixed(1)).join(' ');
  const areaPath = linePath + ` L${points[points.length-1][0].toFixed(1)} ${h-pad} L${points[0][0].toFixed(1)} ${h-pad} Z`;
  const labels = series.map((s,i)=>`<text x="${points[i][0].toFixed(1)}" y="${h-6}" font-size="9" fill="var(--ink-faint)" text-anchor="middle">${s.label}</text>`).join('');
  const dots = points.map((p,i)=>`<circle cx="${p[0].toFixed(1)}" cy="${p[1].toFixed(1)}" r="3" fill="${color}"><title>${series[i].label}: ${valueKey==='revenue'?fmtMoney(series[i][valueKey]):series[i][valueKey]}</title></circle>`).join('');
  return `<svg viewBox="0 0 ${w} ${h}" style="width:100%;height:150px;">
    <path d="${areaPath}" fill="${color}" opacity="0.12" stroke="none"/>
    <path d="${linePath}" fill="none" stroke="${color}" stroke-width="2"/>
    ${dots}${labels}
  </svg>`;
}

function computeForecast(){
  const open = state.opps.filter(o=>o.stage!=='won'&&o.stage!=='lost');
  const weightedTotal = open.reduce((s,o)=>s+(Number(o.value)||0)*(STAGE_WEIGHTS[o.stage]||0),0);
  const rawOpenTotal = open.reduce((s,o)=>s+(Number(o.value)||0),0);
  const byMonth = {};
  open.forEach(o=>{
    const m = (o.expectedClose||'').slice(0,7) || 'No date';
    if(!byMonth[m]) byMonth[m] = {raw:0, weighted:0};
    byMonth[m].raw += Number(o.value)||0;
    byMonth[m].weighted += (Number(o.value)||0)*(STAGE_WEIGHTS[o.stage]||0);
  });
  const months = Object.keys(byMonth).sort();
  const byStage = STAGES.map(s=>{
    const items = state.opps.filter(o=>o.stage===s.id);
    const raw = items.reduce((a,o)=>a+(Number(o.value)||0),0);
    return {stage:s, count:items.length, raw, weighted: raw*(STAGE_WEIGHTS[s.id]||0)};
  });
  return {weightedTotal, rawOpenTotal, byMonth, months, byStage};
}

function campaignStats(campaign){
  const leads = state.leads.filter(l=>l.campaignId===campaign.id);
  const opps = state.opps.filter(o=>o.campaignId===campaign.id);
  const wonValue = opps.filter(o=>o.stage==='won').reduce((s,o)=>s+(Number(o.value)||0),0);
  const cost = Number(campaign.cost)||0;
  const roi = cost>0 ? Math.round(((wonValue-cost)/cost)*100) : null;
  return {leadsCount:leads.length, oppsCount:opps.length, wonValue, roi};
}

/* ============ AUTOMATION RULES ============ */
async function runAutomationRules(module, field, newValue, context, depth){
  depth = depth || 0;
  if(depth > 5) return; // guard against runaway chains
  const matching = (state.rules||[]).filter(r=>r.module===module && r.field===field && r.value===newValue);
  for(const r of matching){
    await fireRule(r, context, depth);
  }
}
async function fireRule(r, context, depth){
  depth = depth || 0;
  const t = {
    id: uid('task'), title: r.taskTitle || ('Follow up'),
    contactId: context.contactId || null, oppId: context.oppId || null, leadId: context.leadId || null,
    dueDate: addDays(todayISO(), Number(r.dueInDays)||1),
    priority:'normal', status:'Not Started', done:false,
    ownerId: r.ownerId || (state.currentUser?state.currentUser.id:null),
    author: 'Automation: '+r.name, createdAt: todayISO()
  };
  await storeSet('task:'+t.id, t);
  state.tasks.push(t);
  flashToast(`Automation "${r.name}" ran — task created`);
  // Connected workflow: chain into another rule's action directly
  if(r.nextRuleId){
    const next = (state.rules||[]).find(x=>x.id===r.nextRuleId);
    if(next) await fireRule(next, context, depth+1);
  }
}

function fmtMetric(fmt, v){
  if(fmt==='money') return fmtMoney(v);
  if(fmt==='pct') return v+'%';
  return String(Math.round(v*10)/10);
}

/* ============ CSV export ============ */
function toCsv(rows, columns){
  const esc = v => { const s=String(v==null?'':v); return /[",\n]/.test(s) ? '"'+s.replace(/"/g,'""')+'"' : s; };
  const header = columns.map(c=>esc(c.label)).join(',');
  const body = rows.map(r=>columns.map(c=>esc(typeof c.get==='function'?c.get(r):r[c.key])).join(',')).join('\n');
  return header+'\n'+body;
}
function downloadCsv(filename, csvText){
  try{
    const blob = new Blob([csvText], {type:'text/csv;charset=utf-8;'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = filename;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    URL.revokeObjectURL(url);
    flashToast('Exported '+filename);
  }catch(e){
    state.csvFallback = {filename, csvText};
    render();
  }
}

async function resetWorkspace(){
  try{
    const tables = ['contacts','notes','opportunities','tasks','leads','products','campaigns','documents','widgets','automation_rules','task_comments'];
    for(const t of tables) await deleteAllRows(t);
  }catch(e){ console.error('reset failed', e); }

  flashToast('Business data cleared. Your team accounts were not touched.');

function bindSetupEvents(){
  const switchToSignup = document.getElementById('switch-to-signup');
  if(switchToSignup) switchToSignup.addEventListener('click', ()=>{ state.authMode='signup'; state.setupError=''; state.setupNotice=''; render(); });
  const switchToSignin = document.getElementById('switch-to-signin');
  if(switchToSignin) switchToSignin.addEventListener('click', ()=>{ state.authMode='signin'; state.setupError=''; state.setupNotice=''; render(); });

  const submit = document.getElementById('auth-submit');
  if(submit) submit.addEventListener('click', async ()=>{
    const mode = state.authMode || 'signin';
    const email = document.getElementById('au-email').value.trim();
    const password = document.getElementById('au-password').value;
    const nameField = document.getElementById('au-name');
    const name = nameField ? nameField.value.trim() : '';
    if(!email || !password){ state.setupError = 'Email and password are both required.'; render(); return; }
    if(mode === 'signup' && !name){ state.setupError = 'Your name is required.'; render(); return; }
    state.setupError = ''; state.setupNotice = ''; state.authLoading = true; render();
    try{
      if(mode === 'signup'){
        const {data, error} = await sb.auth.signUp({ email, password, options:{ data:{ name } } });
        if(error) throw error;
        if(data.session){
          await loadAll();
        } else {
          // Email confirmation is turned on in the Supabase project settings
          state.authLoading = false;
          state.setupNotice = 'Account created — check your email to confirm, then sign in.';
          state.authMode = 'signin';
          render();
        }
      } else {
        const {error} = await sb.auth.signInWithPassword({ email, password });
        if(error) throw error;
        await loadAll();
      }
    }catch(e){
      state.authLoading = false;
      state.setupError = e.message || 'Something went wrong. Please try again.';
      render();
    }
  });

  const reload = document.getElementById('reload-after-signup');
  if(reload) reload.addEventListener('click', ()=>loadAll());
  const signoutNoProfile = document.getElementById('signout-no-profile');
  if(signoutNoProfile) signoutNoProfile.addEventListener('click', async ()=>{ await sb.auth.signOut(); await loadAll(); });
}

    <div class="tile-h"><h3>Pipeline snapshot</h3><a href="#" data-nav="pipeline" style="font-size:11px;color:var(--accent-ochre);font-weight:600;">Open board →</a></div>

  </div>`;
  if(key==='referrals') return `<div class="tile" style="margin-bottom:0;">
    <div class="tile-h"><h3>Top referral sources</h3></div>
    ${stats.topSources.length===0?`<div class="empty-state"><p>No data yet.</p></div>`:stats.topSources.map(([n,c])=>`<div class="bar-row"><div class="bar-label">${escapeHtml(n)}</div><div class="bar-track"><div class="bar-fill" style="width:${stats.topSources[0][1]?c/stats.topSources[0][1]*100:0}%;background:var(--accent-ochre)"></div></div><div class="bar-value">${c}</div></div>`).join('')}
  </div>`;
  return '';
}

function sortArrow(field){ if(state.sortField!==field) return ''; return `<span class="arrow">${state.sortDir==='asc'?'▲':'▼'}</span>`; }
function sortRows(list, fieldMap){
  if(!state.sortField || !fieldMap[state.sortField]) return list;
  const f = fieldMap[state.sortField]; const dir = state.sortDir==='asc'?1:-1;
  return [...list].sort((a,b)=>{ const av=(a[f]==null?'':a[f]), bv=(b[f]==null?'':b[f]); if(typeof av==='number'&&typeof bv==='number') return (av-bv)*dir; return String(av).localeCompare(String(bv))*dir; });
}

function renderTasks(){

  list = [...list].sort((a,b)=>(a.dueDate||'9999').localeCompare(b.dueDate||'9999'));

function renderWidget(w){
  const metrics = getMetrics();
  const m = metrics[w.metric] || {label:'—', kind:'kpi', value:0, fmt:'num'};
  const removeBtn = `<button class="widget-remove" data-action="remove-widget" data-widget="${w.id}" title="Remove">✕</button>`;
  if(w.type==='kpi'){
    return `<div class="widget-tile" draggable="true" data-widget-drag="${w.id}">${removeBtn}<div class="widget-kicker">KPI</div><div class="widget-title">${escapeHtml(w.title||m.label)}</div><div class="widget-kpi-value">${fmtMetric(m.fmt, m.value||0)}</div></div>`;
  }
  if(w.type==='chart'){
    const series = m.series || [];
    const max = Math.max(...series.map(s=>s[1]), 1);
    return `<div class="widget-tile" draggable="true" data-widget-drag="${w.id}">${removeBtn}<div class="widget-kicker">Chart</div><div class="widget-title">${escapeHtml(w.title||m.label)}</div>
      ${series.length===0?`<div class="page-sub">No data yet.</div>`:series.map(([label,val])=>`
        <div class="bar-row"><div class="bar-label">${escapeHtml(label)}</div><div class="bar-track"><div class="bar-fill" style="width:${val/max*100}%"></div></div><div class="bar-value">${fmtMetric(m.fmt,val)}</div></div>
      `).join('')}</div>`;
  }
  if(w.type==='funnel'){
    const series = m.series || [];
    const max = Math.max(...series.map(s=>s[1]), 1);
    const colors = ['#3D6B85','#C28A3A','#A66060','#5A7A55','#6B5B8A'];
    return `<div class="widget-tile" draggable="true" data-widget-drag="${w.id}">${removeBtn}<div class="widget-kicker">Funnel</div><div class="widget-title">${escapeHtml(w.title||m.label)}</div>
      <div class="funnel-wrap">${series.map(([label,val],i)=>{
        const pct = Math.max(val/max*100, 4);
        const rowWidth = Math.max(100 - i*10, 45);
        return `<div class="funnel-row" style="width:${rowWidth}%;">
          <div class="funnel-row-top"><span class="funnel-row-label">${escapeHtml(label)}</span><span class="funnel-row-value">${val}</span></div>
          <div class="funnel-row-track"><div class="funnel-row-fill" style="width:${pct}%;background:${colors[i%colors.length]}"></div></div>
        </div>`;
      }).join('')}</div></div>`;
  }
  if(w.type==='target'){
    const target = Number(w.target)||1;
    const pct = Math.min(Math.round((m.value||0)/target*100), 999);
    return `<div class="widget-tile" draggable="true" data-widget-drag="${w.id}">${removeBtn}<div class="widget-kicker">Target Meter</div><div class="widget-title">${escapeHtml(w.title||m.label)}</div>
      <div style="font-family:var(--mono);font-size:13px;">${fmtMetric(m.fmt,m.value||0)} <span style="color:var(--ink-faint)">of ${fmtMetric(m.fmt,target)}</span></div>
      <div class="target-meter-track"><div class="target-meter-fill" style="width:${Math.min(pct,100)}%"></div></div>
      <div style="font-size:11px;color:var(--ink-muted);">${pct}% of target</div></div>`;
  }
  if(w.type==='comparator'){
    const metrics2 = getMetrics();
    const mb = metrics2[w.metricB] || {label:'—', value:0, fmt:'num'};
    return `<div class="widget-tile" draggable="true" data-widget-drag="${w.id}">${removeBtn}<div class="widget-kicker">Comparator</div><div class="widget-title">${escapeHtml(w.title||(m.label+' vs '+mb.label))}</div>
      <div class="comparator-row">
        <div class="comparator-col"><div class="comparator-num">${fmtMetric(m.fmt,m.value||0)}</div><div class="comparator-label">${escapeHtml(m.label)}</div></div>
        <div class="comparator-vs">vs</div>
        <div class="comparator-col"><div class="comparator-num">${fmtMetric(mb.fmt,mb.value||0)}</div><div class="comparator-label">${escapeHtml(mb.label)}</div></div>
      </div></div>`;
  }
  return `<div class="widget-tile" draggable="true" data-widget-drag="${w.id}">${removeBtn}<div class="page-sub">Unknown widget type.</div></div>`;
}

    el.addEventListener('dragover',(e)=>{ e.preventDefault(); el.classList.add('drag-target'); });

    el.addEventListener('drop',(e)=>{

  const openNewRule = app.querySelector('[data-action="new-rule"]'); if(openNewRule) openNewRule.addEventListener('click',()=>{ state.showNewRule=true; state.newRuleTrigger='opp_stage'; render(); });

  if(saveRule) saveRule.addEventListener('click', async ()=>{

    await storeSet('rule:'+r.id, r); state.rules.push(r); state.showNewRule=false; flashToast('Rule created'); render();

  app.querySelectorAll('[data-action="delete-rule"]').forEach(b=>b.addEventListener('click', async ()=>{

  // notifications

  // onboarding
  const dismissOnboard = app.querySelector('[data-action="dismiss-onboard"]');
  if(dismissOnboard) dismissOnboard.addEventListener('click', async (e)=>{ e.stopPropagation(); state.onboardDismissed=true; await storeSet('meta:onboarding-dismissed', true); render(); });

  // sign out
  app.querySelectorAll('[data-action="switch-user"]').forEach(el=>el.addEventListener('click', async ()=>{
    await sb.auth.signOut();

  }));

  // team / roles / settings
  app.querySelectorAll('[data-change-role]').forEach(sel=>sel.addEventListener('change', async ()=>{
    const id = sel.getAttribute('data-change-role'); const u = state.users.find(x=>x.id===id); if(!u) return;

  app.querySelectorAll('[data-action="remove-user"]').forEach(b=>b.addEventListener('click', async ()=>{

    await storeDelete('user:'+id); state.users = state.users.filter(x=>x.id!==id); flashToast('Removed from team'); render();
  }));
  const saveCompany = app.querySelector('[data-action="save-company"]');
  if(saveCompany) saveCompany.addEventListener('click', async ()=>{

    state.company = {name, tagline}; await storeSet('company:profile', state.company); flashToast('Saved'); render();
  });
  const resetBtn = app.querySelector('[data-action="reset-workspace"]');
  if(resetBtn) resetBtn.addEventListener('click', async ()=>{
    resetBtn.textContent = 'Resetting…';
    await resetWorkspace();
  });

  // CSV exports
  const exC = app.querySelector('[data-action="export-contacts"]'); if(exC) exC.addEventListener('click',()=>{
    const csv = toCsv(state.contacts, [{label:'Name',key:'name'},{label:'Type',key:'type'},{label:'Company',key:'company'},{label:'Email',key:'email'},{label:'Phone',key:'phone'},{label:'Tags',get:r=>(r.tags||[]).join('; ')}]);
    downloadCsv('amara-contacts.csv', csv);
  });
  const exO = app.querySelector('[data-action="export-opps"]'); if(exO) exO.addEventListener('click',()=>{
    const csv = toCsv(state.opps, [{label:'Title',key:'title'},{label:'Contact',get:r=>{const c=contactById(r.contactId);return c?c.name:'';}},{label:'Stage',get:r=>stageInfo(r.stage).label},{label:'Value',key:'value'},{label:'Expected close',key:'expectedClose'},{label:'Source',key:'source'}]);
    downloadCsv('amara-opportunities.csv', csv);
  });
  const exT = app.querySelector('[data-action="export-tasks"]'); if(exT) exT.addEventListener('click',()=>{
    const csv = toCsv(state.tasks, [{label:'Task',key:'title'},{label:'Contact',get:r=>{const c=contactById(r.contactId);return c?c.name:'';}},{label:'Due',key:'dueDate'},{label:'Done',get:r=>r.done?'Yes':'No'},{label:'Priority',key:'priority'}]);
    downloadCsv('amara-tasks.csv', csv);
  });
  const exL = app.querySelector('[data-action="export-leads"]'); if(exL) exL.addEventListener('click',()=>{
    const csv = toCsv(state.leads, [{label:'Name',key:'name'},{label:'Company',key:'company'},{label:'Source',key:'source'},{label:'Status',key:'status'},{label:'Email',key:'email'},{label:'Phone',key:'phone'},{label:'Added',key:'createdAt'}]);
    downloadCsv('amara-leads.csv', csv);
  });
  const exP = app.querySelector('[data-action="export-products"]'); if(exP) exP.addEventListener('click',()=>{

    downloadCsv('amara-products.csv', csv);
  });
}

function flashToast(msg){ state.toast = msg; render(); }

/* ============ AI ============ */
/* ============ ASK MARA — data audit, not business narrative ============ */
function runDataAudit(){
  const issues = [];
  const now = todayISO();

  // Contacts missing both email and phone
  const noContactInfo = state.contacts.filter(c=>!c.email && !c.phone);
  if(noContactInfo.length>0) issues.push(`${noContactInfo.length} contact${noContactInfo.length===1?'':'s'} with no email or phone on file — ${noContactInfo.slice(0,3).map(c=>c.name).join(', ')}${noContactInfo.length>3?', …':''}.`);

  // Possible duplicate contacts (same name, case-insensitive)
  const nameCounts = {};
  state.contacts.forEach(c=>{ const k=(c.name||'').trim().toLowerCase(); if(k) nameCounts[k]=(nameCounts[k]||0)+1; });
  const dupeNames = Object.entries(nameCounts).filter(([,n])=>n>1);
  if(dupeNames.length>0) issues.push(`${dupeNames.length} possible duplicate contact${dupeNames.length===1?'':'s'} by name — worth checking: ${dupeNames.slice(0,3).map(([n])=>n).join(', ')}.`);

  // Opportunities with no expected close date
  const noCloseDate = state.opps.filter(o=>o.stage!=='won'&&o.stage!=='lost'&&!o.expectedClose);
  if(noCloseDate.length>0) issues.push(`${noCloseDate.length} open opportunit${noCloseDate.length===1?'y':'ies'} with no expected close date.`);

  // Opportunities with $0 value still open
  const zeroValue = state.opps.filter(o=>o.stage!=='won'&&o.stage!=='lost'&&(!o.value||Number(o.value)===0));
  if(zeroValue.length>0) issues.push(`${zeroValue.length} open opportunit${zeroValue.length===1?'y':'ies'} still showing $0 value.`);

  // Opportunities stuck in the same stage for 30+ days (using real stage-history timestamps)
  const stuck = state.opps.filter(o=>{
    if(o.stage==='won'||o.stage==='lost') return false;
    const hist = o.stageHistory||[];
    if(hist.length===0) return false;
    const lastChange = new Date(hist[hist.length-1].at);
    return (new Date()-lastChange)/86400000 > 30;
  });
  if(stuck.length>0) issues.push(`${stuck.length} opportunit${stuck.length===1?'y':'ies'} stuck in the same stage for 30+ days — ${stuck.slice(0,3).map(o=>o.title).join(', ')}${stuck.length>3?', …':''}.`);

  // Leads sitting untouched
  const staleLeads = state.leads.filter(l=>l.status==='new' && (new Date()-new Date(l.createdAt))/86400000 > 7);
  if(staleLeads.length>0) issues.push(`${staleLeads.length} lead${staleLeads.length===1?'':'s'} still marked "New" after 7+ days — ${staleLeads.slice(0,3).map(l=>l.name).join(', ')}${staleLeads.length>3?', …':''}.`);

  // Overdue tasks
  const overdue = state.tasks.filter(t=>!t.done && t.dueDate && t.dueDate<now);
  if(overdue.length>0) issues.push(`${overdue.length} task${overdue.length===1?'':'s'} overdue.`);

  // Tasks with no owner
  const noOwner = state.tasks.filter(t=>!t.done && !t.ownerId);
  if(noOwner.length>0) issues.push(`${noOwner.length} open task${noOwner.length===1?'':'s'} with no owner assigned.`);

  if(issues.length===0) return {issues:['No data quality issues found — contacts, opportunities, leads and tasks all look complete and current.'], clean:true};
  return {issues, clean:false};
}

async function runAiAudit(){
  state.aiLoading = true; render();
  const audit = runDataAudit();
  const sampleContacts = state.contacts.slice(0,25).map(c=>({name:c.name, type:c.type, hasEmail:!!c.email, hasPhone:!!c.phone, tags:c.tags}));
  const sampleOpps = state.opps.slice(0,25).map(o=>({title:o.title, stage:o.stage, value:o.value, hasCloseDate:!!o.expectedClose, lineItemCount:(o.lineItems||[]).length}));
  const payload = { ruleBasedFindings: audit.issues, contactSample: sampleContacts, opportunitySample: sampleOpps, totalContacts: state.contacts.length, totalOpportunities: state.opps.length, totalLeads: state.leads.length, totalTasks: state.tasks.length };
  try{
    const response = await fetch("https://api.anthropic.com/v1/messages", {
      method:"POST", headers:{"Content-Type":"application/json"},
      body: JSON.stringify({ model:"claude-sonnet-4-6", max_tokens:1000, messages:[{ role:"user", content:`You are auditing CRM data quality for a healthcare practice (Amara). Below are rule-based findings already computed, plus a sample of the actual records. Your job is NOT to summarize business performance — it's to review the data itself for hygiene issues the simple rules might have missed: inconsistent naming, likely duplicates the rules didn't catch, records that look incomplete or mistyped, patterns worth flagging. Be specific and reference the sample data given. Do not invent records that aren't in the JSON. 4-6 sentences, no preamble, no headers.\n\n${JSON.stringify(payload,null,2)}` }] })
    });
    const data = await response.json();
    const text = (data.content||[]).filter(b=>b.type==='text').map(b=>b.text).join('\n').trim();
    state.aiInsightText = text || 'No response received — try again in a moment.';
  }catch(err){ console.error(err); state.aiInsightText = 'Could not reach the AI audit service right now. The quick audit above still works offline.'; }
  state.aiLoading = false; render();
}

/* ============ INIT ============ */
loadAll();
